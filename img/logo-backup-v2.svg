<svg viewBox="0 0 650 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FB4C8"/>
      <stop offset="100%" stop-color="#4A90A9"/>
    </linearGradient>

    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="barShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur stdDeviation="1" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.15" result="color"/>
      <feComposite operator="in" in2="inverse" in="color" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <filter id="lineShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <linearGradient id="chiGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9F1C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF9F1C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Bars with rounded corners (links) -->
  <rect x="3" y="58" width="18" height="65" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <rect x="24" y="38" width="18" height="85" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <rect x="45" y="18" width="18" height="105" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <circle cx="55" cy="17" r="5" fill="#FF9F1C"/>

  <!-- Text: GSC mit Verlauf (direkt über der Linie) -->
  <text x="125" y="74" font-size="58" font-family="Roboto Slab, serif" font-weight="700" fill="url(#titleGradient)" filter="url(#textShadow)">
    GSC
  </text>

  <!-- Subtitle text -->
  <text x="125" y="100" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="400" fill="#e2e8f0">
    |Glock Statistical Consulting Services|
  </text>

  <!-- Chi² curve: Peak unter dem Punkt, fließt horizontal als Linie unter dem Text -->
  <path d="M12,130 C23,130 34,100 43,68 C47,52 50,34 55,22 C60,10 64,28 71,48 C82,74 96,108 119,124 C127,130 130,128 132,116 C137,90 143,82 159,82 L375,82" fill="none" stroke="url(#chiGradient)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
