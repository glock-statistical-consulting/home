<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FB4C8"/>
      <stop offset="100%" stop-color="#4A90A9"/>
    </linearGradient>

    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c5cdd9"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="barShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur stdDeviation="1" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.15" result="color"/>
      <feComposite operator="in" in2="inverse" in="color" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <filter id="lineShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <linearGradient id="chiGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DB8A1A" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#DB8A1A" stop-opacity="0.75"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9F1C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF9F1C" stop-opacity="0.3"/>
    </linearGradient>

    <radialGradient id="ballGradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#DB8A1A"/>
      <stop offset="60%" stop-color="#DB8A1A"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </radialGradient>
  </defs>

  <!-- Bars with rounded corners -->
  <rect x="10" y="62" width="18" height="60" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <rect x="31" y="42" width="18" height="80" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <rect x="52" y="22" width="18" height="100" fill="url(#barGradient)" rx="3" ry="3" filter="url(#barShadow)"/>
  <circle cx="62" cy="21" r="5" fill="url(#ballGradient)"/>

  <!-- Text: Glock Statistical Consulting Services (Titel) -->
  <text x="118" y="84" font-size="26" font-family="Roboto Slab, serif" font-weight="700" fill="url(#titleGradient)" letter-spacing="0.5">
    <tspan fill="#DB8A1A">G</tspan>lock <tspan fill="#DB8A1A">S</tspan>tatistical <tspan fill="#DB8A1A">C</tspan>onsulting Services
  </text>

  <!-- Line under title -->
  <line x1="115" y1="91.5" x2="570" y2="91.5" stroke="#DB8A1A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Chi² curve - steil links, stark abfallend rechts, auslaufend in die Linie -->
  <path d="M10,120 C18,120 28,104 36,77 C42,56 48,34 54,28 C60,22 66,30 74,47 C84,70 100,107 130,130 C150,145 180,148 210,140 C250,130 300,105 340,98 C360,94 375,93 385,92 L570,92" fill="none" stroke="url(#chiGradient)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
